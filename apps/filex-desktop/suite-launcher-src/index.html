<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>FileX Suite Launcher</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="hero">
        <div>
          <p class="eyebrow">FileX Suite</p>
          <h1>Launcher Suite Fotografi</h1>
          <p id="runtime-info" class="muted">Caricamento runtime...</p>
        </div>
      </header>
      <main>
        <section class="panel">
          <h2>Wizard iniziale</h2>
          <p class="muted">Seleziona i tool da installare o aggiornare. Il canale predefinito e' stable.</p>
          <div class="wizard-actions">
            <button id="refresh-btn" class="btn secondary">Aggiorna stato</button>
            <button id="install-missing-btn" class="btn primary">Installa tool mancanti</button>
          </div>
        </section>

        <section class="panel">
          <h2>Tool disponibili</h2>
          <div id="tools-grid" class="grid"></div>
        </section>

        <section class="panel">
          <h2>Image ID Print AI (opzionale)</h2>
          <p id="ai-status" class="muted">Verifica stato AI sidecar...</p>
        </section>
      </main>
    </div>
    <script type="module" src="./app.js"></script>
  </body>
  </html>
