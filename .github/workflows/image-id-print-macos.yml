name: image-id-print-macos

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - "apps/IMAGE ID PRINT/**"
      - "apps/filex-desktop/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/image-id-print-macos.yml"

jobs:
  build-macos:
    name: image-id-print-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            arch: x64
            npm_script: dist:image-id-print:mac:x64
          - os: macos-15
            arch: arm64
            npm_script: dist:image-id-print:mac:arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          npm ci --include=optional
          npm install --no-save --include=optional --os=darwin --cpu=${{ matrix.arch }} sharp
          npm install --no-save @rollup/rollup-darwin-${{ matrix.arch }}
          npm rebuild sharp --include=optional

      - name: Build macOS package
        shell: bash
        run: |
          set -o pipefail
          npm --workspace @photo-tools/filex-desktop run ${{ matrix.npm_script }} 2>&1 | tee build-macos.log

      - name: Report build failure
        if: failure()
        shell: bash
        run: |
          tail -n 120 build-macos.log > build-macos-tail.log || true
          python - <<'PY'
          from pathlib import Path
          tail = Path("build-macos-tail.log")
          text = tail.read_text(encoding="utf-8", errors="replace") if tail.exists() else "No build log captured."
          text = text.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
          print(f"::error file=.github/workflows/image-id-print-macos.yml,line=1,title=macOS build failure::{text}")
          PY

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: image-id-print-macos-${{ matrix.arch }}
          path: |
            apps/filex-desktop/release/image-id-print/*.dmg
            apps/filex-desktop/release/image-id-print/*.zip
          if-no-files-found: error

      - name: Upload macOS logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: image-id-print-macos-logs-${{ matrix.arch }}
          path: |
            build-macos.log
            build-macos-tail.log
          if-no-files-found: ignore
